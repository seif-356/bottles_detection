name: bottle_detection_app
description: "Offline bottle detection app using YOLOv8 TFLite on-device inference."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.8.0
  image_picker: ^1.1.0
  tflite_flutter: ^0.12.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/yolov8n_float32.tflite
    - assets/models/yolo11s_float32.tflite
